{% extends "edu/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="card">
    <h2>Login</h2>
    <p class="muted">Entre para acessar as rotas protegidas.</p>

    {% if form.errors %}
        <p class="errorlist">Usuário ou senha inválidos. Tente novamente.</p>
    {% endif %}

    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="actions">
            <button type="submit" class="btn">Entrar</button>
            <a href="{% url 'signup' %}" class="btn secondary">Criar conta</a>
        </div>
    </form>
</section>
{% endblock %}
