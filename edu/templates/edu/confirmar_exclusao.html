{% extends "edu/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<section class="card">
    <h2>{{ titulo }}</h2>
    <p>Tem certeza de que deseja excluir o registro <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="btn danger">Confirmar exclusão</button>
            <a class="btn secondary" href="{% url url_cancelar %}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
